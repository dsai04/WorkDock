<!DOCTYPE html>
<html>
<head>
    <title>Work Dock</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style3.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='style4.css') }}">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css?family=Lexend+Deca&display=swap" rel="stylesheet">
</head>
<body>
<ul>
    <img src="{{ url_for('static', filename='logo.jpeg') }}" height="100" width="100">
    <li class="mytitle">WORK DOCK</li>
    <li><a href="signin.html">SIGN IN</a></li>
    <li><a href="SIGNUP.html">SIGN UP</a></li>
</ul>

<div class="search-card-container">
    <div class="search-card">
        <div class="search-card-header">
            <p class="search-card-title">Enter your job details</p>
        </div>

        <!-- ✅ Begin form -->
        <form action="/submit_user" method="post">
            <div class="search-card-body">
                <div class="form-group">
                    <p class="search-label">Name</p>
                    <input type="text" name="txtname" id="txtname" required>
                </div>

                <div class="form-group">
                    <p class="search-label">Profession</p>
                    <input type="text" name="profession" required>
                </div>

                <div class="form-group">
                    <p class="search-label">Location</p>
                    <input type="text" name="location" required>
                </div>

                <div class="form-group">
                    <p class="search-label">Experience</p>
                    <input type="text" name="experience" required>
                </div>

                <div class="form-group">
                    <p class="search-label">Date of birth</p>
                    <input type="date" name="dob" required>
                </div>

                <div class="form-group">
                    <p class="search-label">Employment Type</p>
                    <select name="time" required>
                        <option>Full time</option>
                        <option>Part time</option>
                    </select>
                </div>

                <div class="form-group">
                    <p class="search-label">Qualification</p>
                    <input type="text" name="qualification" required>
                </div>

                <div class="form-group">
                    <p class="search-label">Skills</p>
                    <input type="text" name="skills" required>
                </div>

                <div class="form-group">
                    <p class="search-label">Salary</p>
                    <input type="number" name="salary" required>
                </div>

                <div class="form-group">
                    <p class="search-label">Email</p>
                    <input type="email" name="email" required>
                </div>

                <div class="form-group">
                    <p class="search-label">Phone number</p>
                    <input type="number" name="number" required>
                </div>
            </div>

            <div class="search-card-footer">
                <div class="form-group d-flex-end">
                    <button type="submit" class="search-btn">Submit</button>
                </div>
            </div>
        </form>
        <!-- ✅ End form -->
    </div>
</div>

<div class="search-card-container,two">
    <div class="search-card">
        <div class="search-card-header">
            <p class="search-card-title">Enter your job requirements</p>
        </div>
        <div class="search-card-body">
            <div class="form-group">
                <textarea class="form-control rounded-0" id="other" rows="10" cols="50"></textarea>
            </div>
        </div>
    </div>
</div>
</body>
</html>
