<!DOCTYPE html>
<html>
<head>
    <title>Work Dock</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style3.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='style4.css') }}">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css?family=Lexend+Deca&display=swap" rel="stylesheet">
</head>
<body>
    <ul>
        <img src="{{ url_for('static', filename='logo.jpeg') }}" height="100" width="100">
        <li class="mytitle">WORK DOCK</li>
    </ul>

    <div class="search-card-container">
        <div class="search-card">
            <div class="search-card-header">
                <p class="search-card-title">SIGN IN</p>
            </div>

            <!-- ✅ Start of form -->
            <form action="/signin" method="post">
                <div class="search-card-body">
                    <div class="form-group">
                        <p class="search-label">EMAIL ID</p>
                        <input type="email" name="email" id="EMAIL" required>
                    </div>

                    <div class="form-group">
                        <p class="search-label">Password</p>
                        <input type="password" name="password" id="password" required>
                    </div>
                </div>

                <div class="search-card-footer">
                    <div class="form-group d-flex-end">
                        <button type="submit" class="search-btn">SIGN IN</button>
                    </div>
                </div>
            </form>
            <!-- ✅ End of form -->

        </div>
    </div>
</body>
</html>
